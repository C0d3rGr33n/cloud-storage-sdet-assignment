version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: ai_app_builder_db
    environment:
      POSTGRES_DB: ai_app_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: ai_app_builder_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # FastAPI Backend
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: ai_app_builder_fastapi
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - PROJECTS_DIR=/app/projects
      - DEPLOYMENTS_DIR=/app/deployments
    volumes:
      - ./src:/app/src
      - ./projects:/app/projects
      - ./deployments:/app/deployments
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Django Backend
  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: ai_app_builder_django
    ports:
      - "8001:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - DB_NAME=ai_app_builder
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./django_backend:/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: ai_app_builder_celery
    command: celery -A django_backend worker -l info
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - DB_NAME=ai_app_builder
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./django_backend:/app
    depends_on:
      - postgres
      - redis
      - django
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_app_builder_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  postgres_data: